name: Actualizar Clima Diario

on:
  schedule:
    - cron: '45 9 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  procesar_clima:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar librerías
        run: pip install requests google-genai python-dotenv

      - name: Ejecutar script de clima con Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python clima_aysen.py

      - name: Guardar el JSON generado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Actualización automática del clima"
          file_pattern: "clima_exportado.json"
